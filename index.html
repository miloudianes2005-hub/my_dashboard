<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>My Dashboard</title>
<style>
  :root {
    --text-primary: #FAFAFA;
    --text-secondary: #B8B6B0;
    --text-tertiary: #76746E;
    --success: #6BE3A4;
    --warning: #F2C063;
    --danger: #FF6B6B;
    --mono-font: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    --body-font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: #050506;
    color: var(--text-primary);
    font-family: var(--body-font);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: max(20px, env(safe-area-inset-top)) 20px 60px;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }

  /* Washes and Grain */
  .bg-washes {
    position: fixed; inset: 0; z-index: -2; pointer-events: none;
  }
  .wash-1, .wash-2 {
    position: absolute; border-radius: 50%; filter: blur(40px);
    animation: drift 36s infinite alternate ease-in-out;
  }
  .wash-1 {
    width: 60vw; height: 60vw; background: rgba(224, 118, 88, 0.16);
    top: 14%; left: 82%; transform: translate(-50%, -50%);
  }
  .wash-2 {
    width: 70vw; height: 70vw; background: rgba(180, 180, 200, 0.06);
    top: 90%; left: 18%; transform: translate(-50%, -50%);
    animation-delay: -18s;
  }
  @keyframes drift {
    0% { transform: translate(-50%, -50%) scale(1); }
    100% { transform: translate(-40%, -60%) scale(1.1); }
  }
  body::after {
    content: ''; position: fixed; inset: 0; z-index: -1; pointer-events: none;
    background-image: radial-gradient(rgba(255,255,255,0.8) 1px, transparent 1px);
    background-size: 3px 3px; opacity: 0.014;
  }

  .container {
    width: 100%; max-width: 1100px; display: flex; flex-direction: column;
  }

  /* Comp 1 - Title */
  .dash-title {
    font-size: 28px; font-weight: 700; letter-spacing: -0.025em;
    background: linear-gradient(180deg, #FFFFFF 0%, #C7C4BC 120%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 14px; text-align: left;
  }
  @media (max-width: 480px) { .dash-title { font-size: 22px; } }

  /* Comp 2 - Goal Ticker */
  .ticker-row { margin-bottom: 18px; display: flex; flex-direction: column; gap: 4px; }
  .goal-ticker {
    display: flex; flex-direction: row; align-items: center; gap: 10px;
    padding: 7px 12px; border-radius: 12px;
    background: linear-gradient(180deg, rgba(0,0,0,0.42) 0%, rgba(0,0,0,0.30) 100%);
    background-image: linear-gradient(180deg, rgba(0,0,0,0.42) 0%, rgba(0,0,0,0.30) 100%),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.025) 0, rgba(255,255,255,0.025) 1px, transparent 1px, transparent 3px);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    position: relative; overflow: hidden;
  }
  .goal-ticker::after {
    content: ''; position: absolute; top: 0; left: -40%; width: 30%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
    animation: sweep 8s infinite linear; pointer-events: none;
  }
  @keyframes sweep { 100% { left: 110%; } }
  .goal-ticker-led-dot {
    display: block; width: 7px; height: 7px; border-radius: 50%;
    background: var(--success); box-shadow: 0 0 8px rgba(107,227,164,0.7);
    animation: pulse 1.6s infinite ease-in-out;
  }
  @keyframes pulse { 50% { opacity: 0.45; transform: scale(0.85); } }
  .goal-ticker-label {
    font-family: var(--mono-font); font-size: 9.5px; font-weight: 800;
    letter-spacing: 0.18em; color: var(--text-tertiary);
  }
  .goal-ticker-stage { flex: 1; height: 22px; position: relative; overflow: hidden; }
  .goal-ticker-row {
    display: flex; align-items: center; gap: 8px; height: 22px; width: 100%;
    font-family: var(--mono-font); font-size: 12.5px; font-weight: 600;
    font-variant-numeric: tabular-nums; white-space: nowrap; position: absolute;
  }
  .goal-ticker-status { width: 18px; text-align: center; }
  .goal-ticker-status[data-status="done"] { color: var(--success); }
  .goal-ticker-status[data-status="pending"], .goal-ticker-status[data-status="empty"] { color: var(--text-tertiary); }
  .goal-ticker-text { flex: 1; overflow: hidden; text-overflow: ellipsis; color: var(--text-primary); }
  .goal-ticker-meta {
    font-family: var(--mono-font); font-size: 11px; font-weight: 700;
    font-variant-numeric: tabular-nums; color: var(--text-secondary);
    letter-spacing: 0.04em; padding: 3px 8px; border-radius: 999px;
    background: rgba(255,255,255,0.04); flex-shrink: 0;
  }
  .is-leaving { animation: ticker-leave 0.45s cubic-bezier(0.55, 0, 0.55, 1) forwards; }
  .is-entering { animation: ticker-enter 0.45s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
  @keyframes ticker-leave { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100%); } }
  @keyframes ticker-enter { 0% { opacity: 0; transform: translateY(100%); } 100% { opacity: 1; transform: translateY(0); } }

  /* Comp 3 - Day Ring */
  .day-ring-section {
    display: flex; align-items: center; justify-content: center; gap: 26px;
    margin-bottom: 40px; flex-wrap: wrap; width: 100%;
  }
  .ring-wrapper { position: relative; width: 168px; height: 168px; flex-shrink: 0; }
  .ring-svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .ring-track { fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 8; }
  .ring-fill {
