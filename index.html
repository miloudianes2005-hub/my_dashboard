<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم الشخصية للنشاط والعافية</title>
    <style>
        :root {
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
            --text-color: #333333;
            --primary-color: #3b82f6;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --accent-color: #8b5cf6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-2px);
        }

        .card h2 {
            margin-top: 0;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
            color: #4a5568;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* قسم المياه */
        .water-progress {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            margin: 20px 0;
            color: var(--primary-color);
        }

        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #2563eb;
        }

        button.btn-danger {
            background-color: var(--danger-color);
        }

        button.btn-danger:hover {
            background-color: #dc2626;
        }

        /* قسم المهام */
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .input-group input {
            flex: 1;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 14px;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        li {
            padding: 12px;
            background-color: #f8fafc;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
            border-right: 4px solid var(--accent-color);
        }

        li.completed {
            text-decoration: line-through;
            opacity: 0.6;
            background-color: #e2e8f0;
            border-right-color: #94a3b8;
        }

        .delete-btn {
            background: none;
            border: none;
            color: var(--danger-color);
            cursor: pointer;
            font-size: 16px;
            padding: 0 5px;
        }

        /* قسم الجيم والفيتامينات */
        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f8fafc;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
        }

        .checkbox-item input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>لوحة التحكم الصحية والشخصية</h1>
        <p>تابع عاداتك اليومية ونشاطك الرياضي بكل سهولة</p>
    </header>

    <div class="grid">
        <div class="card">
            <h2>💧 تتبع شرب المياه</h2>
            <div class="water-progress"><span id="water-count">0</span> / 8 أكواب</div>
            <div class="btn-grid">
                <button onclick="addWater()">+ كوب مياه</button>
                <button class="btn-danger" onclick="resetWater()">إعادة تعيين</button>
            </div>
        </div>

        <div class="card">
            <h2>📝 المهام اليومية (اضغط للشطب)</h2>
            <div class="input-group">
                <input type="text" id="todo-input" placeholder="أضف مهمة جديدة...">
                <button onclick="addTodo()">إضافة</button>
            </div>
            <ul id="todo-list">
                </ul>
        </div>

        <div class="card">
            <h2>💊 الفيتامينات والمكملات</h2>
            <div class="checkbox-group">
                <label class="checkbox-item">
                    <input type="checkbox" id="vit-1">
                    <span>فيتامين متعدد (Multivitamin)</span>
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" id="vit-2">
                    <span>أوميغا 3 (Omega 3)</span>
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" id="vit-3">
                    <span>فيتامين د (Vitamin D)</span>
                </label>
            </div>
        </div>

        <div class="card">
            <h2>🏋️‍♂️ التمارين والنشاط الرياضي</h2>
            <div class="checkbox-group">
                <label class="checkbox-item">
                    <input type="checkbox" id="gym-1">
                    <span>تمارين الإحماء والتمديد (Stretching)</span>
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" id="gym-2">
                    <span>حصتي التدريبية في الجيم (Workout)</span>
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" id="gym-3">
                    <span>تناول وجبة ما بعد التمرين</span>
                </label>
            </div>
        </div>
    </div>
</div>

<script>
    // --- منطق تتبع المياه ---
    let waterCount = localStorage.getItem('waterCount') ? parseInt(localStorage.getItem('waterCount')) : 0;
    document.getElementById('water-count').innerText = waterCount;

    function addWater() {
        if(waterCount < 8) {
            waterCount++;
            document.getElementById('water-count').innerText = waterCount;
            localStorage.setItem('waterCount', waterCount);
        }
    }

    function resetWater() {
        waterCount = 0;
        document.getElementById('water-count').innerText = waterCount;
        localStorage.setItem('waterCount', waterCount);
    }

    // --- منطق المهام اليومية ---
    let todos = localStorage.getItem('todos') ? JSON.parse(localStorage.getItem('todos')) : [];
    
    function renderTodos() {
        const list = document.getElementById('todo-list');
        list.innerHTML = '';
        todos.forEach((todo, index) => {
            const li = document.createElement('li');
            li.className = todo.completed ? 'completed' : '';
            li.innerHTML = `
                <span onclick="toggleTodo(${index})">${todo.text}</span>
                <button class="delete-btn" onclick="deleteTodo(event, ${index})">❌</button>
            `;
            list.appendChild(li);
        });
    }

    function addTodo() {
        const input = document.getElementById('todo-input');
        if(input.value.trim() !== '') {
            todos.push({ text: input.value.trim(), completed: false });
            input.value = '';
            saveAndRenderTodos();
        }
    }

    function toggleTodo(index) {
        todos[index].completed = !todos[index].completed;
        saveAndRenderTodos();
    }

    function deleteTodo(event, index) {
        event.stopPropagation(); // لمنع تفعيل الشطب عند الضغط على زر الحذف
        todos.splice(index, 1);
        saveAndRenderTodos();
    }

    function saveAndRenderTodos() {
        localStorage.setItem('todos', JSON.stringify(todos));
        renderTodos();
    }

    // --- منطق الفيتامينات والتمارين (حفظ التحديد تلقائياً) ---
    const checkBoxes = ['vit-1', 'vit-2', 'vit-3', 'gym-1', 'gym-2', 'gym-3'];
    
    checkBoxes.forEach(id => {
        const element = document.getElementById(id);
        // استعادة الحالة عند تحميل الصفحة
        element.checked = localStorage.getItem(id) === 'true';
        // حفظ الحالة عند التغيير
        element.addEventListener('change', () => {
            localStorage.setItem(id, element.checked);
        });
    });

    // تشغيل العرض الأولي للمهام عند فتح الصفحة
    renderTodos();
</script>

</body>
</html>
